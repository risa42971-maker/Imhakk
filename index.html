<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ HAKK TOOL ⚡ - 5 Advanced Tools</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="main-container">
        <!-- Header -->
        <div class="cyber-header">
            <h1 class="glitch">⚡ HAKK TOOL ⚡</h1>
            <p class="cyber-subtitle">>_ 5 Advanced Tools in One Place_</p>
            <div class="cyber-decoration">
                <span class="line"></span>
                <span class="circle"></span>
                <span class="line"></span>
            </div>
        </div>

        <!-- Telegram Info -->
        <div class="telegram-info">
            <div class="neon-card">
                <div class="neon-icon">
                    <i class="fab fa-telegram"></i>
                </div>
                <div class="neon-content">
                    <div class="neon-item">
                        <span class="neon-label">🤖 BOT :</span>
                        <a href="https://t.me/Darknet_cen3bot" target="_blank" class="neon-link">
                            <i class="fab fa-telegram"></i> @Darknet_cen3bot
                        </a>
                    </div>
                    <div class="neon-item">
                        <span class="neon-label">👑 OWNER :</span>
                        <a href="https://t.me/TH3Cen_cee" target="_blank" class="neon-link owner">
                            <i class="fas fa-crown"></i> @TH3Cen_cee
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Menu -->
        <div class="cyber-menu">
            <button class="cyber-btn active" onclick="showTool('ip')" id="menu-ip">
                <i class="fas fa-globe"></i> IP LOOKUP
            </button>
            <button class="cyber-btn" onclick="showTool('url')" id="menu-url">
                <i class="fas fa-link"></i> URL SHORTENER
            </button>
            <button class="cyber-btn" onclick="showTool('upload')" id="menu-upload">
                <i class="fas fa-cloud-upload-alt"></i> UPLOAD VIA BOT
            </button>
            <button class="cyber-btn" onclick="showTool('gmail')" id="menu-gmail">
                <i class="fas fa-envelope"></i> GMAIL GENERATOR
            </button>
            <button class="cyber-btn" onclick="showTool('link')" id="menu-link">
                <i class="fas fa-shield-alt"></i> LINK CHECKER
            </button>
        </div>

        <!-- Tool Container -->
        <div class="glass-container" id="toolContainer">
            <!-- Tools will be loaded here -->
        </div>

        <!-- Footer -->
        <div class="cyber-footer">
            <p>⚡ DEVELOPED BY <span class="neon-text">@TH3Cen_cee</span> ⚡</p>
            <div class="footer-stats">
                <span><i class="fas fa-bolt"></i> 5 TOOLS</span>
                <span><i class="fas fa-shield-alt"></i> SECURE</span>
                <span><i class="fas fa-infinity"></i> FREE</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
